<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="type_of_css.css">      <!--External CSS-->

    <style type="text/css">     /* Internal CSS */                                   
        h2{
            color:green;
            font-size: large;
        }

        p{
            color: aquamarine;
        }

    <h2>Bye world</h2>
    <p>
        A paragraph is a distinct section of a longer piece of writing that focuses on a single idea, composed of one or more sentences
    </p>

    <h3>Hi World</h3>
    
</body>
