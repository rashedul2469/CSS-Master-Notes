<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" type="text/css" href="z-index.css">
    <title>Document</title>
</head>
<body>
    <h1>Overlapping elements with no z-index</h1>
    <p>If two positioned elements overlap each other without a z-index specified,
    the elements render in the order they are defined in the HTML source code:</p>
    <div class="container">
    <div class="black-box">Black box</div>
    <div class="gray-box">Gray box</div>
    <div class="green-box">Green box</div>
</div>
</body>
</html>
