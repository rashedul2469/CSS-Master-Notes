<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
        /* mouse over link */
        h1:hover {
            color: #FF00FF;
        }

        /* selected link */
        #hd:active {
            color: #0000FF;
        }

        h2.highlight:hover {  /*highlight is class name*/
            color: #ff0000;
        }

        div div p:first-child{
            color: aqua;
        }
        /*
        first-child
        last-child 
        nth-child(n) 
        nth-last-child(n)
        */
    </style>
    <title>Document</title>
</head>
<body>
    <h1 id="hd">This is headline</h1>

    <h2 class="highlight">This is headline</h2>

    <div>
        <div>
            <p>This Paragraph Tag</p>
            <p>This Paragraph Tag</p>
            <p>This Paragraph Tag</p>
            <p>This Paragraph Tag</p>
        </div>
    </div>

</body>
</html>
