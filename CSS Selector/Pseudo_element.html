<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
        .title::before {
            content: "★ ";
            color: orange;
        }

        .btn::after {
            content: " ⬇";
        }

        .para::first-letter {
            font-size: 3rem;
            font-weight: bold;
    
        }
    </style>
    <title>Document</title>
</head>
<body>
    <p class="title">Hello World</p>
    <button class="btn">Download</button>
    <p class="para">
    Lorem ipsum dolor sit amet, consectetur adipiscing elit...
    </p>

</body>
</html>
